<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <defs>
    <mask id="m">
      <!-- White = show pick; black text = transparent cutout -->
      <rect width="100" height="100" fill="white"/>
      <text
        x="50" y="44"
        text-anchor="middle"
        dominant-baseline="central"
        font-family="'Courier New', Courier, monospace"
        font-size="23"
        font-weight="900"
        fill="black"
      >&lt;/&gt;</text>
    </mask>
  </defs>
  <!-- Guitar pick shape: wide rounded top, pointed tip at bottom -->
  <path
    d="M50 6C28 6 7 22 7 42C7 63 23 78 50 94C77 78 93 63 93 42C93 22 72 6 50 6Z"
    fill="oklch(0.76 0.18 52)"
    mask="url(#m)"
  />
</svg>
